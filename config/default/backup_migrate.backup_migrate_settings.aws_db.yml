uuid: d7fd3d40-ce6b-4a5e-a6b2-22a84bd9e9f1
langcode: en
status: true
dependencies: {  }
id: aws_db
label: 'AWS db'
config:
  namer:
    filename: REDAA_db
    timestamp: true
    timestamp_format: Y-m-d\TH-i-s
  compressor:
    compression: gzip
  utils:
    site_offline: false
  metadata:
    description: ''
  db_exclude:
    exclude_tables:
      __ACQUIA_MONITORING: __ACQUIA_MONITORING
    nodata_tables:
      cache_bootstrap: cache_bootstrap
      cache_config: cache_config
      cache_container: cache_container
      cache_data: cache_data
      cache_default: cache_default
      cache_discovery: cache_discovery
      cache_dynamic_page_cache: cache_dynamic_page_cache
      cache_entity: cache_entity
      cache_feeds_download: cache_feeds_download
      cache_geocoder: cache_geocoder
      cache_leaflet: cache_leaflet
      cache_menu: cache_menu
      cache_page: cache_page
      cache_render: cache_render
      cache_toolbar: cache_toolbar
      sessions: sessions
      watchdog: watchdog
  private_files_exclude:
    exclude_filepaths:
      - backup_migrate
  public_files_exclude:
    exclude_filepaths:
      - js
      - css
      - php
      - styles
      - 'config_*'
      - .htaccess
  notify:
    notify_success_enable: 0
    notify_success_email: enquiries@redaa.org
    notify_failure_enable: 1
    notify_failure_email: webmaster@iied.org
